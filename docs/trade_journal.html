<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Journal</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
    --text: #e1e4eb; --muted: #8b8fa3;
    --green: #22c55e; --red: #ef4444; --yellow: #eab308; --blue: #3b82f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.4;
  }
  .header {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 15px; font-weight: 600; }
  .header nav { display: flex; gap: 16px; }
  .header a { color: var(--muted); text-decoration: none; font-size: 13px; }
  .header a:hover { color: var(--text); }

  .container { padding: 16px 20px; max-width: 1200px; margin: 0 auto; }

  /* Summary cards */
  .summary {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    margin-bottom: 16px;
  }
  .summary-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
  }
  .summary-card .val { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .summary-card .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .section-label {
    font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 8px;
  }

  /* Entry table */
  .entries-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden;
  }
  .entries-table th {
    text-align: left; padding: 10px 12px; font-size: 11px;
    color: var(--muted); border-bottom: 1px solid var(--border);
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .entries-table td {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .entries-table tr:last-child td { border-bottom: none; }
  .entries-table tr:hover { background: rgba(255,255,255,0.02); }
  .entries-table tr.expandable { cursor: pointer; }

  /* Direction badges */
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600;
  }
  .badge-short { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-long { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-open { background: rgba(59,130,246,0.15); color: var(--blue); }
  .badge-closed { background: rgba(139,143,163,0.15); color: var(--muted); }
  .badge-win { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-loss { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-even { background: rgba(234,179,8,0.15); color: var(--yellow); }

  /* Detail panel */
  .detail-row { display: none; }
  .detail-row.open { display: table-row; }
  .detail-content {
    padding: 12px 16px; background: rgba(0,0,0,0.2);
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .detail-section h4 {
    font-size: 11px; color: var(--muted); margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .detail-section p { font-size: 12px; line-height: 1.5; }
  .detail-section ul { list-style: none; font-size: 12px; }
  .detail-section li { padding: 2px 0; }
  .detail-section li::before { content: "• "; color: var(--muted); }

  .detail-full { grid-column: 1 / -1; }

  .screenshot-thumb {
    max-width: 300px; border-radius: 4px; border: 1px solid var(--border);
    cursor: pointer; transition: transform 0.2s;
  }
  .screenshot-thumb:hover { transform: scale(1.05); }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-overlay img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty-state p { font-size: 14px; margin-bottom: 8px; }
  .empty-state code { font-size: 12px; color: var(--text); background: var(--card); padding: 4px 8px; border-radius: 4px; }

  .pnl-pos { color: var(--green); }
  .pnl-neg { color: var(--red); }

  @media (max-width: 768px) {
    .summary { grid-template-columns: repeat(2, 1fr); }
    .detail-content { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Trade Journal</h1>
  <nav>
    <a href="/">Dashboard</a>
    <a href="/simulations">Simulations</a>
    <a href="/trader">Trader</a>
    <a href="/gap-scan">Gap Scan</a>
    <a href="/trade-journal">Journal</a>
    <a href="/bench">Bench</a>
  </nav>
</div>

<div class="container">
  <div class="summary" id="summary"></div>

  <div class="section-label">Entries</div>
  <div id="entries-container"></div>
</div>

<div class="modal-overlay" id="modal" onclick="this.classList.remove('open')">
  <img id="modal-img" src="" alt="screenshot">
</div>

<script>
async function load() {
  const res = await fetch("/api/trade-journal");
  const data = await res.json();
  renderSummary(data.stats);
  renderEntries(data.entries);
}

function renderSummary(s) {
  const el = document.getElementById("summary");
  if (!s || s.closed === 0) {
    el.innerHTML = `
      <div class="summary-card"><div class="val">${s?.total || 0}</div><div class="lbl">Total Entries</div></div>
      <div class="summary-card"><div class="val">${s?.open || 0}</div><div class="lbl">Open</div></div>
      <div class="summary-card"><div class="val">-</div><div class="lbl">Win Rate</div></div>
      <div class="summary-card"><div class="val">-</div><div class="lbl">Avg P&L</div></div>
    `;
    return;
  }
  const pnlClass = s.avg_pnl >= 0 ? "pnl-pos" : "pnl-neg";
  el.innerHTML = `
    <div class="summary-card"><div class="val">${s.total}</div><div class="lbl">Total Entries</div></div>
    <div class="summary-card"><div class="val">${s.win_rate}%</div><div class="lbl">Win Rate (${s.wins}W ${s.losses}L)</div></div>
    <div class="summary-card"><div class="val ${pnlClass}">${s.avg_pnl >= 0 ? "+" : ""}${s.avg_pnl}%</div><div class="lbl">Avg P&L</div></div>
    <div class="summary-card"><div class="val">${s.high_ratio_trades != null ? s.high_ratio_win_rate + "%" : "-"}</div><div class="lbl">High Ratio Win Rate${s.high_ratio_trades != null ? " (" + s.high_ratio_trades + ")" : ""}</div></div>
  `;
}

function renderEntries(entries) {
  const container = document.getElementById("entries-container");
  if (!entries || entries.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <p>No entries yet</p>
        <code>python src/trade_journal.py add --ticker 8035 --direction short</code>
      </div>
    `;
    return;
  }

  // 新しい順
  const sorted = [...entries].reverse();

  let html = `<table class="entries-table"><thead><tr>
    <th>Date</th><th>Ticker</th><th>Direction</th><th>Board Ratio</th>
    <th>Status</th><th>Outcome</th><th>P&L</th>
  </tr></thead><tbody>`;

  sorted.forEach((e, i) => {
    const dirClass = e.direction === "short" ? "badge-short" : "badge-long";
    const dirLabel = e.direction === "short" ? "SHORT" : "LONG";
    const statusClass = e.status === "open" ? "badge-open" : "badge-closed";
    const ratio = e.pre_market?.ask_bid_ratio;
    const ratioStr = ratio ? ratio.toFixed(1) + "x" : "-";

    let outcomeHtml = "-";
    if (e.result?.outcome) {
      const oc = e.result.outcome;
      outcomeHtml = `<span class="badge badge-${oc}">${oc.toUpperCase()}</span>`;
    }

    let pnlHtml = "-";
    if (e.result?.pnl_pct != null) {
      const cls = e.result.pnl_pct >= 0 ? "pnl-pos" : "pnl-neg";
      pnlHtml = `<span class="${cls}">${e.result.pnl_pct >= 0 ? "+" : ""}${e.result.pnl_pct}%</span>`;
    }

    html += `<tr class="expandable" onclick="toggleDetail(${i})">
      <td>${e.date}</td>
      <td><strong>${e.name || ""}(${e.ticker})</strong></td>
      <td><span class="badge ${dirClass}">${dirLabel}</span></td>
      <td>${ratioStr}</td>
      <td><span class="badge ${statusClass}">${e.status.toUpperCase()}</span></td>
      <td>${outcomeHtml}</td>
      <td>${pnlHtml}</td>
    </tr>`;

    // Detail row
    html += `<tr class="detail-row" id="detail-${i}"><td colspan="7"><div class="detail-content">`;

    // Board info
    const pm = e.pre_market || {};
    html += `<div class="detail-section"><h4>Board Info</h4>`;
    if (pm.ask_volume || pm.bid_volume) {
      html += `<p>Ask: ${(pm.ask_volume || 0).toLocaleString()} / Bid: ${(pm.bid_volume || 0).toLocaleString()}</p>`;
    }
    if (pm.notes) html += `<p>${pm.notes}</p>`;
    if (pm.screenshot) {
      html += `<img class="screenshot-thumb" src="/api/trade-journal/screenshot/${pm.screenshot}"
        onclick="event.stopPropagation(); showModal(this.src)" alt="board">`;
    }
    html += `</div>`;

    // Technicals
    const tech = e.technicals || {};
    html += `<div class="detail-section"><h4>Technicals</h4><ul>`;
    if (tech.close) html += `<li>Close: ${tech.close.toLocaleString()}</li>`;
    if (tech.bb_position) html += `<li>BB: ${tech.bb_position}</li>`;
    if (tech.rsi) html += `<li>RSI: ${tech.rsi}</li>`;
    if (tech.macd) html += `<li>MACD: ${tech.macd}</li>`;
    if (tech.notes) html += `<li>${tech.notes}</li>`;
    html += `</ul></div>`;

    // News
    if (e.news && e.news.length > 0) {
      html += `<div class="detail-section"><h4>News</h4><ul>`;
      e.news.forEach(n => { html += `<li>${n}</li>`; });
      html += `</ul></div>`;
    }

    // Reasoning
    if (e.reasoning) {
      html += `<div class="detail-section${e.news?.length ? "" : " detail-full"}"><h4>Reasoning</h4><p>${e.reasoning}</p></div>`;
    }

    // Result notes
    if (e.result?.notes) {
      html += `<div class="detail-section detail-full"><h4>Result Notes</h4><p>${e.result.notes}</p></div>`;
    }

    html += `</div></td></tr>`;
  });

  html += `</tbody></table>`;
  container.innerHTML = html;
}

function toggleDetail(i) {
  const row = document.getElementById(`detail-${i}`);
  row.classList.toggle("open");
}

function showModal(src) {
  document.getElementById("modal-img").src = src;
  document.getElementById("modal").classList.add("open");
}

load();
</script>
</body>
</html>
