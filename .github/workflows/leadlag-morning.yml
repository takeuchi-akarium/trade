name: Morning Report

on:
  schedule:
    # 毎日 22:00 UTC = 07:00 JST
    - cron: '0 22 * * 0-4'
  workflow_dispatch:  # 手動実行用

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning batch
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/batch_morning.py

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signals/ data/leadlag/position_history.json data/paper_state.json
          git diff --cached --quiet || git commit -m "chore: update signal data [skip ci]"
          git push
