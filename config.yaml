# シグナル・通知設定
notifications:
  discord:
    enabled: true
    webhook_url: "${DISCORD_WEBHOOK_URL}"
  log_file:
    enabled: true
    path: "data/signals/signal_log.tsv"
  line:
    enabled: false
    token: "${LINE_TOKEN}"

signal:
  buy_threshold: 30    # +30以上でBUY
  sell_threshold: -30  # -30以下でSELL

  # 各ソースの重み（合計が100になるよう設定）
  weights:
    fear_greed: 1.0
    vix: 1.0

# TDnet適時開示設定
tdnet:
  enabled: true
  categories:
    - 決算
    - 配当
    - 業績修正
    - 買付
    - 交換
    - 買収
  score_threshold: 40   # この絶対値以上のスコアのみ通知

# RSSニュース設定
rss:
  enabled: true
  feeds:
    # 日本語 - 速報性高い順
    - url: "https://news.yahoo.co.jp/rss/topics/business.xml"
      name: "Yahoo!ビジネス"
    - url: "https://www3.nhk.or.jp/rss/news/cat7.xml"
      name: "NHK経済"
    - url: "https://assets.wor.jp/rss/rdf/nikkei/news.rdf"
      name: "日経速報"
    # 海外 - マーケット速報
    - url: "https://www.cnbc.com/id/100003114/device/rss/rss.html"
      name: "CNBC Finance"
    - url: "https://feeds.marketwatch.com/marketwatch/topstories/"
      name: "MarketWatch"
  score_threshold: 30   # この絶対値以上のスコアのみ通知

# 日米リードラグ戦略設定
leadlag:
  rolling_window: 60      # ローリングウィンドウ (営業日)
  lambda_reg: 0.9         # 正則化パラメータ (0=サンプルのみ, 1=事前のみ)
  num_factors: 3          # 共通ファクター数
  quantile_cutoff: 0.3    # ロング/ショート閾値 (上下30%)
  backtest_start: "2015-01-01"
  backtest_end: "2025-12-31"
  c_full_start: "2010-01-01"
  c_full_end: "2014-12-31"
  ai_comment: true

# 日本小型株スクリーニング設定
jp_stock:
  screener:
    marketCapMin: 1_000_000_000    # 10億円
    marketCapMax: 10_000_000_000   # 100億円
    minVolume: 30_000              # 3万株/日
    minPrice: 200                  # 最低株価
  watchlist: []                     # 手動追加の監視銘柄

# 自動売買設定
trader:
  exchange: gmo
  symbol: BTC
  dry_run: true             # true=注文しない（明示的にfalseにするまで安全）
  dry_run_balance: 100000   # ドライラン時の仮想残高（円）。実資金に合わせて設定
  risk:
    max_daily_loss_pct: 5   # 1日の最大損失%
    price_change_limit: 10  # 急変動スキップ閾値%
    stop_loss_pct: 5        # 逆指値の損切りライン（買値の-N%）

  # 複数戦略を同時稼働
  strategies:
    - name: bb
      mode: long             # ロングのみ（逆張り押し目買い）
      interval: 1d
      params:
        period: 20
        std: 2.0
    - name: ema_don
      mode: long             # ロングのみ（EMA順張り + ドンチャン補完）
      interval: 1d
      params:
        short: 10
        long: 50
        entryPeriod: 20
        exitPeriod: 10
        volFilter: 1.2
    - name: bb_ls
      mode: long_short       # L/S（レンジ相場用、比率変動制で制御）
      interval: 1d
      params:
        period: 20
        std: 2.0

  # 比率変動制: トレンドに応じてweight配分を自動調整
  dynamic_weight:
    enabled: true              # 比率変動制ON
    trend_ma_period: 50        # トレンド判定用SMA期間
    threshold: 2.0             # レジーム判定の乖離率閾値(%)
    # デフォルト: 上昇=ema70%+bb30%, レンジ=bb70%+ema10%+bb_ls20%, 下落=全退避
    # 下げ基調でbb_lsを使いたい場合はコメントを外す:
    # regime_weights:
    #   downtrend: {bb: 0, bb_ls: 100}

    # ファンダ補正: ゴールド/10年債/FnGでレジーム判定を微調整
    funda:
      enabled: true
      up_zone: 5.0             # 上昇圏の境界(SMA50乖離%)
      down_zone: -10.0         # 下落圏の境界
      threshold: 0.3           # Early Transition発動閾値
      boost_threshold: 0.5     # Boost発動閾値
      gold_days: 80            # ゴールド履歴取得日数（51取引日以上必要）
      tnx_days: 35             # 10年債履歴取得日数（21取引日以上必要）
      fng_days: 40             # FnG履歴取得日数
